# fly.toml app configuration file generated for comic-generator on 2026-05-19T21:32:50+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'comic-generator'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3001'

[[mounts]]
  source = 'comic_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1024mb'
